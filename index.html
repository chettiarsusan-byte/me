<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A space for my words</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@200;300;400&display=swap');

        body {
            background-color: #fcfaf7; /* A soft, warm paper tone */
            background-image: radial-gradient(#e8e3dc 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* Subtle paper texture */
            color: #5a5a5a;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            opacity: 0;
            animation: fadeIn 1.5s ease-in forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .card {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 450px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            color: #7a6c67;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        p {
            line-height: 1.8;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            color: #887a75;
            font-weight: 300;
        }

        .engage-link {
            background: #fff;
            border: 1px solid #dcd0ca;
            padding: 15px 40px;
            border-radius: 50px;
            color: #6b5e59;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .engage-link:hover {
            background: #e8dcd6;
            border-color: #e8dcd6;
            color: #4a423f;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello, friend.</h1>
    <p>I was waiting for you for a long time.<br>Finally, now here you are.</p>
    
    <!-- Once approved, put your Razorpay URL here -->
    <a href="#" class="engage-link">Engage with me</a>
</div>

</body>
</html>
