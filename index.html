<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A space for my words | Susan Chettiar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@200;300;400&display=swap');

        body {
            background-color: #fcfaf7;
            background-image: radial-gradient(#e8e3dc 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #5a5a5a;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            opacity: 0;
            animation: fadeIn 1.5s ease-in forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .card {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 450px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            color: #7a6c67;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .author-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b0a5a0;
            margin-bottom: 2rem;
            display: block;
        }

        p {
            line-height: 1.8;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            color: #887a75;
            font-weight: 300;
        }

        /* Styling the Razorpay button to match your vibe */
        .razorpay-payment-button {
            background: #fff !important;
            border: 1px solid #dcd0ca !important;
            padding: 15px 40px !important;
            border-radius: 50px !important;
            color: #6b5e59 !important;
            font-size: 0.85rem !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            cursor: pointer !important;
            transition: all 0.4s ease !important;
            font-family: 'Montserrat', sans-serif !important;
        }

        .razorpay-payment-button:hover {
            background: #e8dcd6 !important;
            border-color: #e8dcd6 !important;
            color: #4a423f !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08) !important;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello, friend.</h1>
    <span class="author-name">— Susan Chettiar</span>
    
    <p>I was waiting for you for a long time.<br>Finally, now here you are.</p>
    
    <!-- Razorpay Payment Button -->
    <form>
        <script 
            src="https://checkout.razorpay.com/v1/payment-button.js" 
            data-payment_button_id="pl_T4MgJOh1aexGZa" 
            async>
        </script>
    </form>
</div>

</body>
</html>
