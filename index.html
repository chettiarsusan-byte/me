<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, friend.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@300&display=swap');
        
        body { 
            background: #fdfaf6; 
            color: #5a5a5a; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            text-align: center; 
            padding: 3rem; 
            max-width: 400px; 
        }
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            color: #8e7d77; 
            margin-bottom: 1.5rem;
        }
        p { 
            line-height: 1.8; 
            margin-bottom: 2.5rem; 
            font-size: 1rem;
            color: #7a7a7a;
        }
        .support-btn { 
            background: #e8dcd6; 
            border: none; 
            padding: 14px 30px; 
            border-radius: 25px; 
            cursor: pointer; 
            color: #6b5e59; 
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .support-btn:hover { 
            background: #dcd0ca; 
            transform: translateY(-2px); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello, friend.</h1>
    <p>I was waiting for you for a long time; finally, now here you are.</p>
    <button class="support-btn" id="rzp-button1">Engage with me</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
</html>
