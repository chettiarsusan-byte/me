<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A little space for my words</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@300&display=swap');
        
        body { 
            background: #fdfaf6; 
            color: #5a5a5a; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            text-align: center; 
            padding: 3rem; 
            max-width: 350px; 
        }
        h1 { font-family: 'Playfair Display', serif; font-style: italic; color: #8e7d77; }
        p { line-height: 1.6; margin-bottom: 2rem; font-size: 0.95rem; }
        .support-btn { 
            background: #e8dcd6; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            color: #6b5e59; 
            font-size: 0.9rem;
            transition: 0.4s;
        }
        .support-btn:hover { background: #dcd0ca; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello, friend.</h1>
    <p>If you've found a piece of yourself in my poetry or videos, consider leaving a little love here to help me keep creating more beauty for this space.</p>
    <button class="support-btn" id="rzp-button1">Gift a Coffee / Support</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
</html>
